name = "isabelle-portfolio-chat"
compatibility_date = "2024-01-01"
main = "chat-proxy.js"

[ai]
binding = "AI"

[[unsafe.bindings]]
type = "ratelimit"
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
